[Interface]
Address = 10.0.0.1/24, fd42:42:42::1/64
ListenPort = 51820
PrivateKey = ${SERVER_PRIVATE_KEY}

# PostUp
# IPv4
PostUp = iptables -I FORWARD 1 -i wg0 -j ACCEPT
PostUp = iptables -I FORWARD 2 -o wg0 -j ACCEPT
PostUp = iptables -t nat -A POSTROUTING -s 10.0.0.0/24 -o enp0s6 -j MASQUERADE
PostUp = iptables -I INPUT 1 -p udp --dport 51820 -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
PostUp = iptables -I INPUT 2 -p udp --dport 51820 -m conntrack --ctstate NEW -m limit --limit 25/second --limit-burst 100 -j ACCEPT
PostUp = iptables -I INPUT 3 -p udp --dport 51820 -j DROP
PostUp = iptables -I INPUT 4 -i wg0 -d 10.0.0.1 -p udp --dport 53 -j ACCEPT
PostUp = iptables -I INPUT 5 -i wg0 -d 10.0.0.1 -p tcp --dport 53 -j ACCEPT
# IPv6
PostUp = ip6tables -I FORWARD 1 -i wg0 -j ACCEPT
PostUp = ip6tables -I FORWARD 2 -o wg0 -j ACCEPT
PostUp = ip6tables -t nat -A POSTROUTING -s fd42:42:42::/64 -o enp0s6 -j MASQUERADE
PostUp = ip6tables -I INPUT 1 -p udp --dport 51820 -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
PostUp = ip6tables -I INPUT 2 -p udp --dport 51820 -m conntrack --ctstate NEW -m limit --limit 25/second --limit-burst 100 -j ACCEPT
PostUp = ip6tables -I INPUT 3 -p udp --dport 51820 -j DROP
PostUp = ip6tables -I INPUT 4 -i wg0 -d fd42:42:42::1 -p udp --dport 53 -j ACCEPT
PostUp = ip6tables -I INPUT 5 -i wg0 -d fd42:42:42::1 -p tcp --dport 53 -j ACCEPT

# PostDown
# IPv4
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT
PostDown = iptables -D FORWARD -o wg0 -j ACCEPT
PostDown = iptables -t nat -D POSTROUTING -s 10.0.0.0/24 -o enp0s6 -j MASQUERADE
PostDown = iptables -D INPUT -p udp --dport 51820 -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
PostDown = iptables -D INPUT -p udp --dport 51820 -m conntrack --ctstate NEW -m limit --limit 25/second --limit-burst 100 -j ACCEPT
PostDown = iptables -D INPUT -p udp --dport 51820 -j DROP
PostDown = iptables -D INPUT -i wg0 -d 10.0.0.1 -p udp --dport 53 -j ACCEPT
PostDown = iptables -D INPUT -i wg0 -d 10.0.0.1 -p tcp --dport 53 -j ACCEPT
# IPv6
PostDown = ip6tables -D FORWARD -i wg0 -j ACCEPT
PostDown = ip6tables -D FORWARD -o wg0 -j ACCEPT
PostDown = ip6tables -t nat -D POSTROUTING -s fd42:42:42::/64 -o enp0s6 -j MASQUERADE
PostDown = ip6tables -D INPUT -p udp --dport 51820 -m conntrack --ctstate ESTABLISHED,RELATED -j ACCEPT
PostDown = ip6tables -D INPUT -p udp --dport 51820 -m conntrack --ctstate NEW -m limit --limit 25/second --limit-burst 100 -j ACCEPT
PostDown = ip6tables -D INPUT -p udp --dport 51820 -j DROP
PostDown = ip6tables -D INPUT -i wg0 -d fd42:42:42::1 -p udp --dport 53 -j ACCEPT
PostDown = ip6tables -D INPUT -i wg0 -d fd42:42:42::1 -p tcp --dport 53 -j ACCEPT

[Peer]
PublicKey = ${CLIENT_PUBLIC_KEY}
AllowedIPs = 10.0.0.2/32, fd42:42:42::2/128
PersistentKeepalive = 25